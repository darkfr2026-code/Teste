<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site GitHub Pages</title>
  <style>
    /* Fundo e centralizaçăo */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3b3b6b);
      color: #fff;
      text-align: center;
    }

    /* Título com animaçăo */
    h1 {
      font-size: 3em;
      animation: fadeIn 2s ease-in-out;
    }

    /* Subtítulo */
    p {
      font-size: 1.2em;
      margin-top: 10px;
      color: #ccc;
      animation: fadeIn 3s ease-in-out;
    }

    /* Botăo estilizado */
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      color: #fff;
      background: #ff4c4c;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    a.button:hover {
      background: #ff1a1a;
    }

    /* Animaçăo de fade */
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div>
    <h1>Olá, Mundo!</h1>
    <p>Meu primeiro site no GitHub Pages está funcionando! </p>
    <a href="#" class="button">Clique Aqui</a>
  </div>
</body>
</html>
